<header class="private-header">
  <div class="brand" routerLink="/home" (click)="closeAllMenus()">
    <img
      src="https://upload.wikimedia.org/wikipedia/commons/c/ce/Coca-Cola_logo.svg"
      alt="Coca-Cola"
    >
  </div>

  <button class="mobile-toggle" type="button" (click)="toggleMobileMenu($event)">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <div class="header-content" [class.open]="mobileMenuOpen">
    <nav class="private-nav">
      <a routerLink="/home" routerLinkActive="active" (click)="closeAllMenus()">Inicio</a>

      <div class="nav-dropdown" (click)="$event.stopPropagation()">
        <button class="nav-btn" type="button" (click)="toggleCatalogMenu($event)">
          Catálogo
        </button>

        <div class="dropdown-menu" [class.show]="catalogMenuOpen">
          <button type="button" (click)="irCategoria('Carbonatadas')">Carbonatadas</button>
          <button type="button" (click)="irCategoria('Agua')">Agua</button>
          <button type="button" (click)="irCategoria('Hidratantes')">Hidratantes</button>
          <button type="button" (click)="irCategoria('Té')">Té</button>
          <button type="button" (click)="irPromociones()">Promociones</button>
        </div>
      </div>

      <div class="nav-dropdown" (click)="$event.stopPropagation()">
        <button class="nav-btn" type="button" (click)="toggleEventsMenu($event)">
          Eventos
        </button>

        <div class="dropdown-menu" [class.show]="eventsMenuOpen">
          <button type="button" (click)="irEvento('mundial')">Mundial FIFA</button>
          <button type="button" (click)="irEvento('music')">Coke Music</button>
          <button type="button" (click)="irEvento('campanias')">Campañas Coca-Cola</button>
        </div>
      </div>

      <a routerLink="/cart" routerLinkActive="active" class="cart-link" (click)="closeAllMenus()">
        <span class="cart-icon">🛒</span>
        <span>Carrito</span>
        <span class="cart-count">{{ cartCount }}</span>
      </a>
    </nav>

    <div class="user-box" (click)="$event.stopPropagation()">
      <button class="menu-btn" type="button" (click)="toggleUserMenu($event)">
        <span class="user-text">{{ userName }}</span>
        <span class="user-arrow">▾</span>
      </button>

      <div class="dropdown-menu user-dropdown" [class.show]="userMenuOpen">
        <div class="dropdown-user">
          <h4>{{ userName }}</h4>
          <p>Tu espacio personal</p>
        </div>

        <a routerLink="/profile" (click)="closeAllMenus()">Editar perfil</a>
        <a routerLink="/my-orders" (click)="closeAllMenus()">Mis pedidos</a>
        <a routerLink="/cart" (click)="closeAllMenus()">Ver carrito</a>
        <button type="button" class="logout-link" (click)="logout()">Cerrar sesión</button>
      </div>
    </div>
  </div>
</header>
